name: Deploy Frontend To Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - "frontend-astro/**"
      - ".github/workflows/deploy-frontend-cloudflare.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-astro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-astro/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build for Cloudflare
        run: npm run build:cloudflare
        env:
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          PUBLIC_TROUBLESHOOTING_PASSWORD: ${{ secrets.PUBLIC_TROUBLESHOOTING_PASSWORD }}

      - name: Deploy with Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
